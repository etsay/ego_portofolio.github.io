<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffccd5;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #ff4d6d;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 25px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
        }
        
        .yes {
            background: #ff4d6d;
            color: white;
        }
        
        .no {
            background: #ddd;
            position: absolute;
        }
        
        .message {
            display: none;
            margin-top: 20px;
            color: #ff4d6d;
            font-size: 22px;
            font-weight: bold;
        }
        
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            animation: fly 6s linear infinite;
        }
        
        @keyframes fly {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body onclick="playMusic()">

    <button id="startButton" style="position:absolute; top:40%; padding:15px 30px; border:none; border-radius:50px; background:#ff4d6d; color:white; font-size:18px; cursor:pointer; z-index:10;">Buka ❤️</button>

    <div class="box" id="content" style="display:none;">
        <h1>Hai Kamu ❤️</h1>
        <p>Mau gak jadi pacar aku?</p>

        <button class="yes" onclick="yesClick()">Yes ❤️</button>
        <button class="no" id="noBtn">No 😢</button>

        <div class="message" id="message">
            Terimakasih ❤️ Sekarang kita bareng terus ya 🥰
        </div>
    </div>

    <audio id="birthdayMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

    <script>
        const noBtn = document.getElementById('noBtn');

        noBtn.addEventListener('mouseover', () => {
            noBtn.style.top = Math.random() * 80 + 'vh';
            noBtn.style.left = Math.random() * 80 + 'vw';
        });

        document.getElementById("startButton").addEventListener("click", function() {
            document.getElementById("content").style.display = "block";
            this.style.display = "none";
            playMusic();
            createConfetti();
            createBalloonsAndFlowers();
        });

        function playMusic() {
            const audio = document.getElementById("birthdayMusic");
            audio.play().catch(error => console.log("Autoplay error:", error));
        }

        function createConfetti() {
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.background = ['#ff4d6d', '#ffd6e0', '#cdb4db', '#a2d2ff'][Math.floor(Math.random() * 4)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '50%';
                confetti.style.animation = 'fly 4s linear forwards';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function createBalloonsAndFlowers() {
            for (let i = 0; i < 20; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.style.background = ['#ff4d6d', '#ff85a1', '#ffcad4', '#cdb4db'][Math.floor(Math.random() * 4)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (Math.random() * 3 + 3) + 's';
                document.body.appendChild(balloon);

                setTimeout(() => balloon.remove(), 6000);
            }
        }

        function yesClick() {
            document.getElementById('message').style.display = 'block';

            for (let i = 0; i < 20; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');

                const colors = ['#ff4d6d', '#ff85a1', '#ffcad4', '#cdb4db', '#a2d2ff'];
                balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (Math.random() * 3 + 3) + 's';

                document.body.appendChild(balloon);

                setTimeout(() => {
                    balloon.remove();
                }, 6000);
            }
        }
    </script>

</body>

</html>

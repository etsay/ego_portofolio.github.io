<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffccd5;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #ff4d6d;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 25px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
        }
        
        .yes {
            background: #ff4d6d;
            color: white;
        }
        
        .no {
            background: #ddd;
            position: absolute;
        }
        
        .message {
            display: none;
            margin-top: 20px;
            color: #ff4d6d;
            font-size: 22px;
            font-weight: bold;
        }
        
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            animation: fly 6s linear infinite;
        }
        
        @keyframes fly {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Hai Kamu ❤️</h1>
        <p>Mau gak jadi pacar aku?</p>

        <button class="yes" onclick="yesClick()">Yes ❤️</button>
        <button class="no" id="noBtn">No 😢</button>

        <div class="message" id="message">
            Terimakasih ❤️ Sekarang kita bareng terus yaaa ..
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        noBtn.addEventListener('mouseover', () => {
            noBtn.style.top = Math.random() * 80 + 'vh';
            noBtn.style.left = Math.random() * 80 + 'vw';
        });

        function yesClick() {
            document.getElementById('message').style.display = 'block';

            for (let i = 0; i < 20; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');

                const colors = ['#ff4d6d', '#ff85a1', '#ffcad4', '#cdb4db', '#a2d2ff'];
                balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (Math.random() * 3 + 3) + 's';

                document.body.appendChild(balloon);

                setTimeout(() => {
                    balloon.remove();
                }, 6000);
            }
        }
    </script>

</body>

</html>
